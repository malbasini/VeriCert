<div th:fragment="content(template,pageTitle, active)">
    <!--SUMMERNOTE -->
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>
    <div class="container mt-5">
        <hr>
        <div id="result" class="mt-3"></div>
        <br>
        <input type="hidden" id="id" name="id" th:value="${template.getId()}">
        <input type="hidden" id="tenant" name="tenant" th:value="${template.getTenant().getName()}">
        <div class="input-group mb-3">
            <span class="input-group-text" id="inputGroup-sizing-sm6">Nome</span>
            <input type="text" id="name" class="form-control" name="name" th:value="${template.getName()}" placeholder="Nome template" aria-label="Small" aria-describedby="inputGroup-sizing-sm6">
            <span class="input-group-text" id="inputGroup-sizing-sm1">Versione</span>
            <input type="text" id="version" class="form-control" placeholder="Versione" th:value="${template.getVersion()}" name="version" aria-label="Small" aria-describedby="inputGroup-sizing-sm1">
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text">Template Html</span>
            <div class="form-control p-0">
                <textarea id="editor" th:utext="${template.getHtml()}"></textarea> <!-- CKEditor host -->
            </div>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text">Variabili JSON</span>
            <div class="form-control p-0">
                <div id="jsonEditor" class="w-100" style="height:320px;border:1px solid #dee2e6;border-radius:.375rem;"></div>
            </div>
            <!-- textarea nascosta che verrà inviata al server -->
            <textarea id="variablesUserJson" th:text="${template.getUserVarSchema()}" name="user_vars_schema" hidden></textarea>
        </div>
        <div class="input-group mb-3">
            <div class="form-check">
                <label class="form-check-label" for="active">
                    Attivo
                </label>
                <input class="form-check-input sm-4" type="checkbox" id="active" name="active" th:checked="${template.isActive()}">
            </div>
        </div>
        <div>
            <button id="btn1" class="btn btn-outline-primary gap-2" onclick="updateTemplate()">Aggiorna Template</button>
        </div>
        <br>
    </div>
    <!-- Host dell'editor + hidden per il submit -->
    <script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/super-build/ckeditor.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const el = document.querySelector('#editor');
            if (!el) return;

            window.editor = await CKEDITOR.ClassicEditor.create(el, {
                language: 'it',

                toolbar: {
                    items: [
                        // titoli & paragrafi
                        'heading', '|', 'alignment', 'outdent', 'indent', '|',

                        // testo
                        'bold', 'italic', 'underline', 'strikethrough', 'highlight', 'removeFormat', '|',

                        // font & colori
                        'fontFamily', 'fontSize', 'fontColor', 'fontBackgroundColor', '|',

                        // liste
                        'bulletedList', 'numberedList', 'todoList', '|',

                        // inserimenti
                        'link', 'blockQuote', 'insertTable', 'horizontalLine', 'mediaEmbed', 'insertImage', '|',

                        // utility
                        'findAndReplace', 'selectAll', 'undo', 'redo'
                    ]
                },

                // Link esterni → apri in nuova scheda con rel sicuri
                link: {
                    decorators: {
                        addTargetToExternalLinks: true,
                        defaultProtocol: 'https://',
                        toggleDownloadable: {
                            mode: 'manual',
                            label: 'Scaricabile',
                            attributes: {download: 'file'}
                        }
                    }
                },

                // Tabelle gradevoli
                table: {
                    contentToolbar: [
                        'tableColumn', 'tableRow', 'mergeTableCells',
                        'tableProperties', 'tableCellProperties'
                    ]
                },

                // Permetti classi/stili/attributi (utile con Bootstrap/utility CSS)
                htmlSupport: {
                    allow: [
                        {name: /.*/, attributes: true, classes: true, styles: true}
                    ]
                },

                // Se usi HtmlEmbed, lascialo **senza** code/source. (Puoi aggiungere un sanitize custom in seguito)
                htmlEmbed: {showPreviews: true},

                // 🔒 RIMUOVI plugin a pagamento / pericolosi per il PDF
                removePlugins: [
                    // cloud & a pagamento
                    'CloudServices', 'CKBox', 'CKBoxUtils', 'CKFinder', 'CKFinderUploadAdapter', 'EasyImage',
                    'CKBoxImageEdit', 'CKBoxImageEditEditing', 'CKBoxImageEditUI',
                    'RealTimeCollaborativeComments', 'RealTimeCollaborativeTrackChanges',
                    'RealTimeCollaborativeRevisionHistory', 'PresenceList', 'Comments',
                    'TrackChanges', 'TrackChangesData', 'RevisionHistory',
                    'WProofreader', 'MathType', 'CaseChange', 'FormatPainter', 'TableOfContents',
                    'SlashCommand', 'Template', 'DocumentOutline', 'Pagination',
                    'ExportPdf', 'ExportWord', 'PasteFromOfficeEnhanced',
                    'AIAssistant', 'AIAssistantUI', 'AIAssistantEditing', 'AIAdapter',
                    'OpenAIAdapter', 'OpenAITextAdapter', 'OpenAIImageAdapter',
                    'AzureOpenAIAdapter', 'AzureOpenAITextAdapter', 'AzureOpenAIImageAdapter',
                    'AnthropicAIAdapter', 'AnthropicAITextAdapter', 'AnthropicAIImageAdapter',
                    'GoogleAIAdapter', 'GoogleAITextAdapter', 'GoogleAIImageAdapter',
                    'BedrockAIAdapter', 'BedrockAITextAdapter', 'BedrockAIImageAdapter',

                    // ❗️niente “code” per evitare HTML escapato nei PDF
                    'Code', 'CodeBlock', 'SourceEditing', 'MultiLevelList', 'MultiLevelListEditing', 'MultiLevelListUI'
                ]
            });
        });
    </script>

    <script>
        // 1) Crea l'editor
        const container = document.getElementById('jsonEditor');
        const editorJson = new JSONEditor(container, {
            mode: 'code',      // 'code' (testo), 'tree' (ad albero) o 'form'
            mainMenuBar: false // opzionale, interfaccia più pulita
        });

        // 2) Carica un valore iniziale dalla textarea (se presente)
        (function preloadFromTextarea() {
            const ta = document.getElementById('variablesUserJson');
            if (!ta.value || ta.value.trim() === '') {
                // default iniziale sensato
                editorJson.set({
                    ownerName: { type: 'string', label: 'Intestatario', required: true },
                    courseName: { type: 'string', label: 'Nome corso', required: true },
                    hours: { type: 'number', label: 'Ore', default: 12 },
                    grade: { type: 'string', enum: ['A','B','C'] }
                });
            } else {
                try {
                    editorJson.set(JSON.parse(ta.value));
                } catch (e) {
                    // Se il JSON salvato era corrotto, mostra comunque il raw
                    editorJson.updateText(ta.value);
                }
            }
        })();

        // 3) (Opzionale) Sync live mentre l’utente digita, utile se hai anteprima
        //    Attenzione: fai debounce per non stressare la pagina
        let t;
        editorJson.on('change', () => {
            clearTimeout(t);
            t = setTimeout(() => {
                try {
                    const json = editorJson.get();
                    document.getElementById('variablesUserJson').value = JSON.stringify(json);
                } catch (_) {
                    // in modalità "code" può essere temporaneamente invalido: ignora
                }
            }, 300);
        });
    </script>
    <script>
        async function updateTemplate() {
                const API_BASE = "/api/admin/templates";
                const name = document.getElementById("name").value.trim();
                const id = document.getElementById("id").value.trim();
                const version = document.getElementById("version").value.trim();
                const html = document.getElementById("editor").value.trim();
                const variablesUserJson = document.getElementById("variablesUserJson").value.trim();
                const active = document.getElementById("active").checked;
                try {
                    const response = await fetch(`${API_BASE}/${id}/edit`, {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            id: id,
                            name: name,
                            version: version,
                            html:html,
                            variablesUserJson: variablesUserJson,
                            active: active
                        })
                    });

                    const resultDiv = document.getElementById("result");
                    const data = await response.json();
                    if (!response.ok) {
                        showToast(data?.error + ` Status HTTP ${response.status}`, {colorClass: 'bg-danger'});
                        const errors = data.errors || {};
                        showToast(Object.entries(errors).map(([field, msgs]) => `${field}: ${msgs[0]}`).join("\n"), {colorClass: 'bg-info'});
                    } else {
                        resultDiv.innerHTML = `
                    <div class="alert alert-success">
                        ✅ <b>Template aggiornato con successo</b><br>
                        <b>ID:</b> ${data.id}<br>
                        <b>Nome:</b> ${data.name}<br>
                        <b>Versione:</b> ${data.version}<br>
                        <b>Attivo:</b> ${data.active}<br>
                        <b>Nome tenant:</b> ${data.tenant}<br>
                    </div>
                `;
                            showToast("Template aggiornato con successo", {colorClass: 'bg-success'});
                        }
                }
            catch (error) {
                console.error("Errore durante l'aggiornamento del template:", error);
                showToast(error.message,{ colorClass: 'bg-danger' });
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</div>
