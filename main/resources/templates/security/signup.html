<!DOCTYPE html>
<html lang="it" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
</head>
<body>
<div th:replace="base :: headerFragment"></div>
<br>
    <br>
    <h2 class="mb-3">Signup</h2>
    <br>
    <div class="input-group mb-3">
            <label for="username" class="input-group-text" id="inputGroup-sizing-sm">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Username" name="username" aria-label="Small" aria-describedby="inputGroup-sizing-sm">
            <label for="password" class="input-group-text" id="inputGroup-sizing-sm3">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Password" name="password" aria-label="Small" aria-describedby="inputGroup-sizing-sm">
            <label for="tenant" class="input-group-text" id="inputGroup-sizing-sm2">Nome tenant</label>
            <input type="text" class="form-control" placeholder="Nome tenant" id="tenant" name="nometenant" aria-label="Small" aria-describedby="inputGroup-sizing-sm">
    </div>
    <div class="input-group mb-3">
        <label for="email" class="input-group-text" id="inputGroup-sizing-sm1">Email</label>
        <input type="email" id="email" class="form-control"  placeholder="Email" name="email" aria-label="Small" aria-describedby="inputGroup-sizing-sm">
        <button type="button" onclick="signup()" class="btn btn-primary form-control">Signup</button>
    </div>
    <br>
    <div class="input-group mb-3">
         <div class="row">
             <div class="col-md-4"></div>
             <div class="col-md4">
                <div class="g-recaptcha" th:attr="data-sitekey=${@captchaSettings.getSite()}"></div>
             </div>
             <div class="col-md-4"></div>
         </div>
    </div>
</div>
<script>
    async function signup() {

        const API_BASE = "http://localhost:8080";
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const tenant = document.getElementById("tenant").value;
        const email = document.getElementById("email").value;
        const captchaToken = document.querySelector('textarea[name="g-recaptcha-response"]')?.value || ''

        const response = await fetch(`${API_BASE}/signup`,{
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password,
                email: email,
                tenantName: tenant,
                captchaToken: captchaToken
            })
        });
        const data = await response.json();
        if (!response.ok) {
            await showToast(data?.error + ` Status HTTP ${response.status}`, {colorClass: 'bg-danger'});
        }
        else {
            showToast("Registrazione avvenuta con successo", {colorClass: 'bg-success'})
        }
    }
</script>




















</body>
<div th:insert="footer :: footerFragment"></div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</html>
