# Redirect HTTP -> HTTPS (eccetto per Let's Encrypt challenge)
server {
    listen 80;
    listen [::]:80;
    server_name app.vercert.org;

    # Location per Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tutto il resto a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy verso l'app Spring Boot
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.vercert.org;

    # Certificati Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/app.vercert.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.vercert.org/privkey.pem;

    # (Opzionale ma consigliato, se presenti)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Log (solo se vuoi)
    access_log /var/log/nginx/vericert.access.log;
    error_log  /var/log/nginx/vericert.error.log warn;

    location / {
        proxy_pass http://vericert-app:8080;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
