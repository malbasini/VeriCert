<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<header th:fragment="headerFragment">
    <meta charset="UTF-8">
    <link  href="/vendor/jsoneditor/jsoneditor.min.css" rel="stylesheet">
    <script src="/vendor/jsoneditor/jsoneditor.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
            integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
            crossorigin="anonymous"></script>
    <!-- Qui potrai importare Bootstrap 5.3 (CSS e JS) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="/vendor/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/vendor/fontawesome/css/all.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
    <!-- CAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="/static/js/app.js"></script>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand fw-semibold" th:href="@{/admin}">
            <i class="bi bi-shield-check me-1 text-success"></i> VeriCert
        </a>
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="navMain" class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <th:block sec:authorize="hasAnyRole('ADMIN','MANAGER','ISSUER')">
                        <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Sezione admin</a></li>
                    </th:block>
                </ul>
            </div>
            <div class="ms-auto d-flex align-items-center text-white small">
            <span class="me-3">
                Tenant:
                <strong sec:authorize="isAuthenticated()" th:text="${#authentication.principal.tenantName}">Tenant</strong>
            </span>
                <span class="me-3">
                <strong sec:authorize="!isAuthenticated()">Nessun Tenant</strong>
            </span>
                <span class="me-3" sec:authorize="isAuthenticated()">
            <i class="bi bi-person-circle me-1"></i>
            <span sec:authentication="name">utente</span>
            </span>
                <form th:action="@{/logout}" method="post" class="m-0 p-0" sec:authorize="isAuthenticated()">
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </button>
                </form>
                <!-- Se anonimo -->
                <div sec:authorize="isAnonymous()">
                    <a class="btn btn-sm btn-outline-light ms-2" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/signup}">Signup</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Barra notifiche (flash) sotto la navbar -->
    <div th:if="${#httpServletRequest != null and #httpServletRequest.getSession(false) != null}">
        <div class="bg-body-tertiary border-bottom" th:if="${#httpServletRequest.getSession(false) != null}">
            <div class="container py-2">
                <div th:if="${flash != null}">
                    <div class="alert alert-success mb-0" th:if="${flash.type == 'success'}" th:text="${flash.message}"></div>
                    <div class="alert alert-danger  mb-0" th:if="${flash.type == 'error'}"   th:text="${flash.message}"></div>
                    <div class="alert alert-warning mb-0" th:if="${flash.type == 'warn'}"    th:text="${flash.message}"></div>
                    <div class="alert alert-info    mb-0" th:if="${flash.type == 'info'}"    th:text="${flash.message}"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- Toast container in basso a destra -->
    <div class="toast-container position-fixed bi-align-top end-0 p-3" style="z-index: 2000;">
        <div id="globalToast" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="globalToastBody">
                    <!-- msg dinamico -->
                </div>
                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"
                        aria-label="Close"></button>
            </div>
        </div>
    </div>
    <script>
        function showToast(message, opts = {}) {
            // opts: { colorClass: 'bg-danger' | 'bg-success' | ... , autohide: true, delay: 5000 }
            const { colorClass = 'bg-danger', autohide = true, delay = 10000 } = opts;

            // Contenitore per i toasts (una sola volta nella pagina)
            let toastContainer = document.getElementById('toastContainer');
            if (!toastContainer) {
                toastContainer = document.createElement('div');
                toastContainer.id = 'toastContainer';
                toastContainer.className = 'toast-container position-fixed top-0 end-0 p-3';
                document.body.appendChild(toastContainer);
            }

            // Struttura toast Bootstrap 5
            const toastEl = document.createElement('div');
            toastEl.className = 'toast align-items-center text-white ' + colorClass;
            toastEl.role = 'alert';
            toastEl.ariaLive = 'assertive';
            toastEl.ariaAtomic = 'true';
            toastEl.innerHTML = `
            <div class="d-flex">
              <div class="toast-body">${message}</div>
              <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
  `;
            toastContainer.appendChild(toastEl);

            const toast = new bootstrap.Toast(toastEl, { autohide, delay });
            toast.show();
        }
    </script>
</header>
</html>
