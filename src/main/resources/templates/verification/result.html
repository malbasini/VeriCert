<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Verifica certificato</title>
</head>
<body class="bg-light">
<div th:replace="base :: headerFragment"></div>
<div class="container">
    <div class="row justify-content-center text-left">
        <div class="col-md-4">
            <h1>Verifica certificato</h1>
            <div id="result"></div>
        </div>
    </div>
</div>
</body>
<script>
    (async function () {
        const resultEl = document.getElementById('result');
        const path = window.location.pathname;
        const parts = path.split('/').filter(Boolean);
        const code = parts[parts.length - 1];
        if (!code) {
            showToast(`Codice non specificato`, { colorClass: 'bg-danger' });
            return;
        }

        try {
            const response = await fetch(`/v/${code}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' },
                credentials: 'same-origin'
            });
            const data = await response.json();
            if (response.ok) {
                resultEl.innerHTML = `
                    <div class="alert alert-success"><b>Certificato valido ✅</b></div>
                    ${data.code ? `<p>Codice: <strong>${data.code}</strong></p>` : ''}
                    ${data.ownerName ? `<p>Proprietario: <strong>${data.ownerName}</strong></p>` : ''}
                    ${data.ownerEmail ? `<p>Email: <strong>${data.ownerEmail}</strong></p>` : ''}
                    ${data.issueDate ? `<p>Data rilascio: <strong>${data.issueDate}</strong></p>` : ''}
                `;
            } else {
                showToast(`Certificato non valido`, { colorClass: 'bg-danger' ,autohide: false});
            }
        } catch (e) {
            showToast(`Errore di rete: ${e?.message ?? 'imprevisto'}`, { colorClass: 'bg-danger' });
        }
    })();
</script>
<div th:replace="footer :: footerFragment"></div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</html>
